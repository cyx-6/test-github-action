name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to publish (manual run)"
        required: true
  pull_request:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: install llvm
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $Version = "22.1.0"
          $Prefix = "C:\opt\llvm"

          Write-Host "Installing LLVM $Version to $Prefix"

          # Install micromamba
          $MicromambaUrl = "https://micro.mamba.pm/api/micromamba/win-64/latest"
          $MicromambaDir = "$env:TEMP\micromamba"
          $MicromambaExe = "$MicromambaDir\Library\bin\micromamba.exe"

          if (-not (Test-Path $MicromambaExe)) {
              Write-Host "Downloading micromamba..."
              New-Item -ItemType Directory -Path $MicromambaDir -Force | Out-Null
              $tarball = "$env:TEMP\micromamba.tar.bz2"
              Invoke-WebRequest -Uri $MicromambaUrl -OutFile $tarball
              tar -xvjf $tarball -C $MicromambaDir
              if (-not (Test-Path $MicromambaExe)) {
                  throw "Failed to extract micromamba"
              }
          }
          Write-Host "Using micromamba: $MicromambaExe"

          # Create environment with LLVM
          Write-Host "Creating conda environment with LLVM $Version..."
          & $MicromambaExe create -p $Prefix -c conda-forge `
              "llvmdev=$Version" "clangdev=$Version" "compiler-rt=$Version" `
              zlib `
              -y
          if ($LASTEXITCODE -ne 0) { throw "micromamba create failed" }

          # Build libzstd from source with CMake (MSVC static)
          $ZstdVersion = "1.5.7"
          $ZstdTarball = "$env:TEMP\zstd-$ZstdVersion.tar.gz"
          $ZstdSrc = "$env:TEMP\zstd-$ZstdVersion"

          Write-Host "Building zstd $ZstdVersion from source..."
          if (-not (Test-Path $ZstdTarball)) {
              Invoke-WebRequest -Uri "https://github.com/facebook/zstd/releases/download/v$ZstdVersion/zstd-$ZstdVersion.tar.gz" -OutFile $ZstdTarball
          }
          if (Test-Path $ZstdSrc) { Remove-Item -Recurse -Force $ZstdSrc }
          tar -xzf $ZstdTarball -C $env:TEMP

          $ZstdBuild = "$env:TEMP\_zstd_build"
          if (Test-Path $ZstdBuild) { Remove-Item -Recurse -Force $ZstdBuild }

          cmake -S "$ZstdSrc\build\cmake" -B $ZstdBuild `
              -DCMAKE_INSTALL_PREFIX="$Prefix" `
              -DZSTD_BUILD_SHARED=OFF -DZSTD_BUILD_STATIC=ON `
              -DZSTD_BUILD_PROGRAMS=OFF
          if ($LASTEXITCODE -ne 0) { throw "zstd cmake configure failed" }

          cmake --build $ZstdBuild --config Release --target install -j $env:NUMBER_OF_PROCESSORS
          if ($LASTEXITCODE -ne 0) { throw "zstd build failed" }

          # Cleanup
          Remove-Item -Recurse -Force $ZstdSrc -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $ZstdBuild -ErrorAction SilentlyContinue

          Write-Host "LLVM $Version installed to $Prefix"

      - name: run orc test (hello-world.c)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $LLVMPrefix = "C:\opt\llvm"
          $BinDir = "$LLVMPrefix\Library\bin"
          $Clang = "$BinDir\clang.exe"
          $JitLink = "$BinDir\llvm-jitlink.exe"
          $TestDir = "$env:GITHUB_WORKSPACE\tests\orc\windows\x86-64"
          $TmpDir = "$env:TEMP\orc-tests"
          New-Item -ItemType Directory -Path $TmpDir -Force | Out-Null

          # Find ORC runtime
          $RuntimeDir = & $Clang -print-runtime-dir 2>$null
          Write-Host "clang -print-runtime-dir: $RuntimeDir"
          $OrcRt = Get-ChildItem -Path $RuntimeDir -Filter "orc_rt*.lib" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $OrcRt) {
              $OrcRt = Get-ChildItem -Path $LLVMPrefix -Filter "liborc_rt*.a" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($OrcRt) {
              $OrcRtPath = $OrcRt.FullName
              Write-Host "ORC runtime: $OrcRtPath"
              Write-Host "ORC runtime size: $((Get-Item $OrcRtPath).Length) bytes"
          } else {
              Write-Host "WARNING: ORC runtime not found"
              $OrcRtPath = ""
          }

          # Inspect the orc_rt lib - list archive members
          Write-Host "`n=== ORC runtime archive contents ==="
          & "$BinDir\llvm-ar.exe" t $OrcRtPath 2>&1 | Select-Object -First 30

          # Compile hello-world.c
          Write-Host "`n=== Compiling hello-world.c ==="
          & $Clang --driver-mode=cl -MD -c -o "$TmpDir\hello-world.obj" "$TestDir\hello-world.c"
          if ($LASTEXITCODE -ne 0) { throw "Compile failed" }

          # Inspect the compiled object
          Write-Host "`n=== hello-world.obj symbol table ==="
          & "$BinDir\llvm-objdump.exe" -t "$TmpDir\hello-world.obj" 2>&1 | Select-Object -First 30

          # Try 1: without ORC runtime, without slab-allocate
          Write-Host "`n=== Try 1: llvm-jitlink (no orc-runtime) ==="
          $output1 = & $JitLink "$TmpDir\hello-world.obj" 2>&1 | Out-String
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "Output: $output1"

          # Try 2: without ORC runtime, with slab-allocate
          Write-Host "`n=== Try 2: llvm-jitlink -slab-allocate=64MB (no orc-runtime) ==="
          $output2 = & $JitLink -slab-allocate=64MB "$TmpDir\hello-world.obj" 2>&1 | Out-String
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "Output: $output2"

          # Try 3: with ORC runtime
          Write-Host "`n=== Try 3: llvm-jitlink -orc-runtime -slab-allocate=64MB ==="
          $output3 = & $JitLink "-orc-runtime=$OrcRtPath" -slab-allocate=64MB "$TmpDir\hello-world.obj" 2>&1 | Out-String
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "Output: $output3"

          # Try 4: with ORC runtime, no-process-syms, slab-allocate (original lit config)
          Write-Host "`n=== Try 4: llvm-jitlink -orc-runtime -no-process-syms=true -slab-allocate=64MB ==="
          $output4 = & $JitLink "-orc-runtime=$OrcRtPath" -no-process-syms=true -slab-allocate=64MB "$TmpDir\hello-world.obj" 2>&1 | Out-String
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "Output: $output4"

          # Try 5: with ORC runtime, show-graph to debug symbol issues
          Write-Host "`n=== Try 5: llvm-jitlink -orc-runtime -slab-allocate=64MB -show-err-failed-to-materialize ==="
          $output5 = & $JitLink "-orc-runtime=$OrcRtPath" -slab-allocate=64MB -show-err-failed-to-materialize "$TmpDir\hello-world.obj" 2>&1 | Out-String
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "Output: $output5"