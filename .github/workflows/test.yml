name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to publish (manual run)"
        required: true
  pull_request:
  push:

jobs:
  collect_linux_orc_rt_libs:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: install and collect Linux orc_rt libs
        run: |
          # wget https://apt.llvm.org/llvm.sh
          # chmod +x llvm.sh
          sudo apt-get update
          sudo apt-get install -y clang-18 clang-19 clang-20 clang-21 clang-22
          mkdir output
          cp /usr/lib/llvm-18/lib/clang/18/lib/linux/liborc_rt-x86_64.a output/18-liborc_rt-x86_64.a
          cp /usr/lib/llvm-19/lib/clang/19/lib/linux/liborc_rt-x86_64.a output/19-liborc_rt-x86_64.a
          cp /usr/lib/llvm-20/lib/clang/20/lib/linux/liborc_rt-x86_64.a output/20-liborc_rt-x86_64.a
          cp /usr/lib/llvm-21/lib/clang/21/lib/linux/liborc_rt-x86_64.a output/21-liborc_rt-x86_64.a
          cp /usr/lib/llvm-22/lib/clang/22/lib/linux/liborc_rt-x86_64.a output/22-liborc_rt-x86_64.a
      - uses: actions/upload-artifact@v4
        with:
          name: liborc_rt
          path: ./output/*.a
  collect_macos_orc_rt_libs:
    strategy:
      fail-fast: false
    runs-on: macos-latest
    steps:
      - name: install and collect macOS orc_rt libs
        run: |
          brew install llvm@18 llvm@19 llvm@20 llvm@21
          mkdir output
          cp /opt/homebrew/Cellar/llvm@18/18*/lib/clang/18/lib/darwin/liborc_rt_osx.a output/18-liborc_rt_osx.a
          cp /opt/homebrew/Cellar/llvm@19/19*/lib/clang/19/lib/darwin/liborc_rt_osx.a output/19-liborc_rt_osx.a
          cp /opt/homebrew/Cellar/llvm@20/20*/lib/clang/20/lib/darwin/liborc_rt_osx.a output/20-liborc_rt_osx.a
          cp /opt/homebrew/Cellar/llvm@21/21*/lib/clang/21/lib/darwin/liborc_rt_osx.a output/21-liborc_rt_osx.a
      - uses: actions/upload-artifact@v4
        with:
          name: liborc_rt
          path: ./output/*.a