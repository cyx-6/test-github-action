name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to publish (manual run)"
        required: true
  pull_request:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: install llvm
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          $Version = "22.1.0"
          $Prefix = "C:\opt\llvm"

          Write-Host "Installing LLVM $Version to $Prefix"

          # Install micromamba
          $MicromambaUrl = "https://micro.mamba.pm/api/micromamba/win-64/latest"
          $MicromambaDir = "$env:TEMP\micromamba"
          $MicromambaExe = "$MicromambaDir\Library\bin\micromamba.exe"

          if (-not (Test-Path $MicromambaExe)) {
              Write-Host "Downloading micromamba..."
              New-Item -ItemType Directory -Path $MicromambaDir -Force | Out-Null
              $tarball = "$env:TEMP\micromamba.tar.bz2"
              Invoke-WebRequest -Uri $MicromambaUrl -OutFile $tarball
              tar -xvjf $tarball -C $MicromambaDir
              if (-not (Test-Path $MicromambaExe)) {
                  throw "Failed to extract micromamba"
              }
          }
          Write-Host "Using micromamba: $MicromambaExe"

          # Create environment with LLVM
          Write-Host "Creating conda environment with LLVM $Version..."
          & $MicromambaExe create -p $Prefix -c conda-forge `
              "llvmdev=$Version" "clangdev=$Version" "compiler-rt=$Version" `
              zlib `
              -y
          if ($LASTEXITCODE -ne 0) { throw "micromamba create failed" }

          # Build libzstd from source with CMake (MSVC static)
          $ZstdVersion = "1.5.7"
          $ZstdTarball = "$env:TEMP\zstd-$ZstdVersion.tar.gz"
          $ZstdSrc = "$env:TEMP\zstd-$ZstdVersion"

          Write-Host "Building zstd $ZstdVersion from source..."
          if (-not (Test-Path $ZstdTarball)) {
              Invoke-WebRequest -Uri "https://github.com/facebook/zstd/releases/download/v$ZstdVersion/zstd-$ZstdVersion.tar.gz" -OutFile $ZstdTarball
          }
          if (Test-Path $ZstdSrc) { Remove-Item -Recurse -Force $ZstdSrc }
          tar -xzf $ZstdTarball -C $env:TEMP

          $ZstdBuild = "$env:TEMP\_zstd_build"
          if (Test-Path $ZstdBuild) { Remove-Item -Recurse -Force $ZstdBuild }

          cmake -S "$ZstdSrc\build\cmake" -B $ZstdBuild `
              -DCMAKE_INSTALL_PREFIX="$Prefix" `
              -DZSTD_BUILD_SHARED=OFF -DZSTD_BUILD_STATIC=ON `
              -DZSTD_BUILD_PROGRAMS=OFF
          if ($LASTEXITCODE -ne 0) { throw "zstd cmake configure failed" }

          cmake --build $ZstdBuild --config Release --target install -j $env:NUMBER_OF_PROCESSORS
          if ($LASTEXITCODE -ne 0) { throw "zstd build failed" }

          # Cleanup
          Remove-Item -Recurse -Force $ZstdSrc -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $ZstdBuild -ErrorAction SilentlyContinue

          Write-Host "LLVM $Version installed to $Prefix"

      - name: build orc runtime from source with clang-cl
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $LLVMVersion = "22.1.0"
          $LLVMPrefix = "C:\opt\llvm"
          $BinDir = "$LLVMPrefix\Library\bin"
          $ClangCl = "$BinDir\clang-cl.exe"
          $LlvmAr = "$BinDir\llvm-ar.exe"
          $BuildDir = "$env:TEMP\orc-rt-build"
          $OrcRtOut = "$env:TEMP\orc-rt-build\orc_rt-x86_64.lib"
          New-Item -ItemType Directory -Path $BuildDir -Force | Out-Null

          # Download compiler-rt source
          $Tarball = "$env:TEMP\llvm-project-llvmorg-$LLVMVersion.tar.gz"
          $SrcRoot = "$env:TEMP\llvm-project-llvmorg-$LLVMVersion"
          if (-not (Test-Path $Tarball)) {
              Write-Host "Downloading LLVM $LLVMVersion source..."
              Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/archive/refs/tags/llvmorg-$LLVMVersion.tar.gz" -OutFile $Tarball
          }
          if (-not (Test-Path "$SrcRoot\compiler-rt\lib\orc")) {
              Write-Host "Extracting compiler-rt source..."
              tar -xzf $Tarball -C $env:TEMP "llvm-project-llvmorg-$LLVMVersion/compiler-rt/lib/orc" "llvm-project-llvmorg-$LLVMVersion/compiler-rt/include"
          }

          $OrcSrcDir = "$SrcRoot\compiler-rt\lib\orc"
          $IncludeDir = "$SrcRoot\compiler-rt\include"
          $LibDir = "$SrcRoot\compiler-rt\lib"

          # Windows ORC sources (common + COFF platform)
          $Sources = @(
              "debug.cpp",
              "dlfcn_wrapper.cpp",
              "reoptimize.cpp",
              "rtti.cpp",
              "log_error_to_stderr.cpp",
              "run_program_wrapper.cpp",
              "resolve.cpp",
              "coff_platform.cpp",
              "coff_platform.per_jd.cpp"
          )

          $Objects = @()
          foreach ($src in $Sources) {
              $obj = "$BuildDir\$($src -replace '\.cpp$', '.obj')"
              Write-Host "Compiling $src ..."
              & $ClangCl /MD /O2 /D_HAS_EXCEPTIONS=0 /EHs-c- `
                  /I"$OrcSrcDir" /I"$LibDir" /I"$IncludeDir" `
                  /c /o"$obj" "$OrcSrcDir\$src"
              if ($LASTEXITCODE -ne 0) { throw "Failed to compile $src" }
              $Objects += $obj
          }

          # Create static library
          Write-Host "Creating orc_rt-x86_64.lib ..."
          & $LlvmAr rcs $OrcRtOut @Objects
          if ($LASTEXITCODE -ne 0) { throw "llvm-ar failed" }
          Write-Host "Built ORC runtime: $OrcRtOut ($((Get-Item $OrcRtOut).Length) bytes)"

      - name: run orc test (hello-world.c)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $LLVMPrefix = "C:\opt\llvm"
          $BinDir = "$LLVMPrefix\Library\bin"
          $Clang = "$BinDir\clang.exe"
          $JitLink = "$BinDir\llvm-jitlink.exe"
          $TestDir = "$env:GITHUB_WORKSPACE\tests\orc\windows\x86-64"
          $TmpDir = "$env:TEMP\orc-tests"
          $OrcRtPath = "$env:TEMP\orc-rt-build\orc_rt-x86_64.lib"
          New-Item -ItemType Directory -Path $TmpDir -Force | Out-Null

          Write-Host "ORC runtime (clang-cl built): $OrcRtPath"
          $ClangCl = "$Clang --driver-mode=cl"

          # Compile hello-world.c
          Write-Host "`n=== Compiling hello-world.c ==="
          & $Clang --driver-mode=cl -MD -c -o "$TmpDir\hello-world.obj" "$TestDir\hello-world.c"
          if ($LASTEXITCODE -ne 0) { throw "Compile failed" }

          # Run with clang-cl-built ORC runtime
          Write-Host "`n=== llvm-jitlink -orc-runtime (clang-cl built) -slab-allocate=64MB ==="
          & $JitLink "-orc-runtime=$OrcRtPath" -slab-allocate=64MB "$TmpDir\hello-world.obj" 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit 1 }