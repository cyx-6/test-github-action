name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to publish (manual run)"
        required: true
  pull_request:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # python-version: ['3.12']

    steps:
      - name: create cond env
        run: |
          conda create -n build python=3.12 -y -q
          conda install -n build -c conda-forge llvmdev=22.1.0 clangdev=22.1.0 -y -q
          conda run -n build clang --version
          conda run -n build clang++ --version
          conda run -n build llvm-config --link-static --libfiles core orcjit support native
          # $CONDA/envs/build/bin/clang --version
          # $CONDA/envs/build/bin/clang++ --version