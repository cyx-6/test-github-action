name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to publish (manual run)"
        required: true
  pull_request:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # python-version: ['3.12']

    steps:
      - name: create cond env
        run: |
          conda create -n build python=3.12 -y -q
          conda install -n build -c conda-forge llvmdev=22.1.0 clangdev=22.1.0 -y -q
          conda init --all

      - name: create cond env
        run: |
          conda activate build
          which clang clang++
          echo $CONDA
          ls $CONDA/envs/build/bin