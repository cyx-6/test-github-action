name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to publish (manual run)"
        required: true
  pull_request:
  push:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # python-version: ['3.12']

    steps:
      - name: Install LLVM and clang
        run: |
          conda install -y -c conda-forge llvmdev=22.1.0 clangdev=22.1.0